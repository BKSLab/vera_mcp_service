networks:
  # Общая сеть для сквозной интеграции трёх сервисов (MCP_SERVICE_PLAN.md,
  # Этап 8). Создаётся один раз вручную: `docker network create vera_network`
  # — не управляется этим (или любым другим) отдельным docker-compose.yml,
  # чтобы поднятие/остановка одного репозитория не рвало сеть соседям.
  vera_network:
    external: true

services:
  mcp_service:
    container_name: vera_mcp_service
    build: .
    env_file: .env
    environment:
      # Резолвится по имени контейнера в общей сети (`vera_network`), а не
      # `localhost` из `.env` (тот верен только для локальной разработки
      # одного репозитория) — тот же паттерн, что и `RABBITMQ_HOST`/
      # `REDIS_HOST` в `vera_agent_service/docker-compose.yml`.
      RAG_SERVICE_URL: http://vera_rag_service:8000
      # Этап 8.3 — дублирование Phoenix решено: единственный общий инстанс —
      # `vera_agent_phoenix` (поднимается из vera_agent_service/docker-compose.yml).
      # Собственный `phoenix`-сервис этого файла убран (был до Этапа 8) —
      # два независимых Phoenix в одной сети не дают единого дерева трейса
      # через все три сервиса, чего явно требует AGENT_VERA_ARCHITECTURE.md.
      PHOENIX_OTLP_ENDPOINT: http://vera_agent_phoenix:6006/v1/traces
    restart: on-failure
    command: bash entrypoint.sh
    # Порт хоста отличается от vera_rag_service (8000) и vera_agent_service (8010),
    # чтобы все три сервиса могли работать локально одновременно без конфликта портов —
    # 9000 совпадает с MCP_SERVER_URL по умолчанию в vera_agent_service/.env.example.
    ports:
      - "9000:8000"
    deploy:
      resources:
        limits:
          # Сервис полностью stateless, без очереди/checkpointer'а (в отличие от
          # vera_agent_service, где лимит 1GB) — тоньше, placeholder-значение.
          memory: 512M
    networks:
      # `default` — неявная сеть этого compose-проекта (сейчас в ней больше
      # никого нет, т.к. `phoenix` этого файла убран) + `vera_network` для
      # связи с vera_agent_service/vera_rag_service.
      - default
      - vera_network
