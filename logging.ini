[loggers]
keys=root,vera_mcp_service,httpx,httpcore

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_vera_mcp_service]
level=INFO
handlers=consoleHandler
qualname=vera_mcp_service
propagate=0

[logger_httpx]
level=WARNING
handlers=consoleHandler
qualname=httpx
propagate=0

[logger_httpcore]
level=WARNING
handlers=consoleHandler
qualname=httpcore
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter

[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(name)s %(funcName)s %(message)s
